    <style>
        /* ===== RESET & BASE ===== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a1a1a;
            --secondary: #e5e5e5;
            --accent: #ff6b35;
            --font: system-ui, 'Impact', 'Arial Black', sans-serif;
            --gap: 32px;
            --padding: 48px;
            --section-gap: 80px;
            --border-w: 4px;
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font);
            background: var(--primary);
            color: var(--secondary);
            line-height: 1.3;
            letter-spacing: -0.02em;
            word-break: keep-all;
        }

        /* ===== TYPOGRAPHY ===== */
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Impact', 'Arial Black', system-ui, sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            color: var(--secondary);
        }

        h1 {
            font-size: clamp(3.5rem, 12vw, 7rem);
            line-height: 0.88;
            margin-bottom: 0.2em;
        }

        h2 {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            border-bottom: var(--border-w) solid var(--accent);
            display: inline-block;
            padding-bottom: 0.15em;
            margin-bottom: var(--gap);
            letter-spacing: -0.03em;
        }

        p {
            font-size: 1.15rem;
            max-width: 60ch;
            margin-bottom: 1.5rem;
        }

        a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 2px solid currentColor;
            transition: all 0.1s ease;
        }
        a:hover {
            background: var(--accent);
            color: var(--primary);
        }

        /* ===== BRUTALIST RAW TEXTURES ===== */
        .texture-bg {
            background-image: 
                repeating-linear-gradient(45deg, transparent, transparent 8px, rgba(255,107,53,0.04) 8px, rgba(255,107,53,0.04) 16px),
                repeating-linear-gradient(-45deg, transparent, transparent 8px, rgba(255,255,255,0.02) 8px, rgba(255,255,255,0.02) 16px);
        }

        /* ===== LAYOUT ===== */
        .full-bleed {
            width: 100%;
            max-width: none;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 var(--padding);
        }

        section {
            padding: var(--section-gap) 0;
        }

        .asymmetric-grid {
            display: grid;
            grid-template-columns: 2fr 1.2fr;
            gap: var(--gap);
        }

        .asymmetric-grid-rev {
            grid-template-columns: 1.2fr 2fr;
        }

        /* ===== HEADER / NAV ===== */
        body > header {
            background: var(--primary);
            border-bottom: var(--border-w) solid var(--accent);
            padding: 24px var(--padding);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-size: 2.2rem;
            color: var(--accent);
            letter-spacing: -0.04em;
            line-height: 1;
            border: none;
        }
        .logo:hover {
            background: transparent;
            color: var(--accent);
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: var(--gap);
            align-items: center;
        }

        nav a {
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            border: var(--border-w) solid transparent;
            padding: 8px 16px;
            transition: 0.1s;
            display: inline-block;
        }
        nav a:hover {
            border-color: var(--accent);
            background: var(--accent);
            color: var(--primary);
        }

        .nav-cta a {
            background: var(--accent);
            color: var(--primary);
            border-color: var(--accent);
        }

        /* 햄버거 메뉴 버튼 (데스크탑에서 숨김) */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 6px;
            background: none;
            border: var(--border-w) solid var(--secondary);
            padding: 10px 12px;
            cursor: pointer;
        }
        .hamburger span {
            display: block;
            width: 28px;
            height: 4px;
            background: var(--secondary);
            border-radius: 0;
        }

        /* ===== HERO ===== */
        #hero {
            background: var(--primary);
            padding: var(--section-gap) 0;
            position: relative;
            overflow: hidden;
            margin-top: -1px;
        }

        #hero::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -10%;
            width: 60%;
            height: 140%;
            background: repeating-linear-gradient(
                -12deg,
                transparent 0px,
                transparent 24px,
                rgba(255,107,53,0.07) 24px,
                rgba(255,107,53,0.07) 28px
            );
            transform: skewX(8deg);
            pointer-events: none;
        }

        .hero-block {
            position: relative;
            z-index: 2;
        }

        .hero-badge {
            display: inline-block;
            background: var(--accent);
            color: var(--primary);
            font-weight: 900;
            font-size: 0.9rem;
            padding: 8px 20px;
            transform: rotate(-2deg);
            border: var(--border-w) solid var(--primary);
            margin-bottom: 24px;
            letter-spacing: 0.05em;
        }

        .hero-phone {
            display: inline-block;
            font-size: 2.8rem;
            font-weight: 900;
            color: var(--accent);
            border: var(--border-w) solid var(--accent);
            padding: 12px 32px;
            background: var(--primary);
            margin-top: 24px;
            transform: rotate(1deg);
            transition: 0.1s;
        }
        .hero-phone:hover {
            background: var(--accent);
            color: var(--primary);
        }

        .hero-emoji {
            font-size: 5rem;
            display: block;
            margin: 24px 0;
            transform: rotate(-5deg);
        }

        /* ===== INFO SECTION ===== */
        #info .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: var(--gap);
            margin-top: var(--gap);
        }

        .stat-card {
            background: var(--primary);
            border: var(--border-w) solid var(--secondary);
            padding: 32px 24px;
            text-align: center;
            transform: rotate(var(--rot, 0deg));
        }
        .stat-card:nth-child(odd) { --rot: -1deg; }
        .stat-card:nth-child(even) { --rot: 1.5deg; }

        .stat-num {
            font-size: 3.8rem;
            font-weight: 900;
            color: var(--accent);
            line-height: 1;
            display: block;
        }
        .stat-label {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 8px;
            color: var(--secondary);
        }

        /* ===== UGC REVIEWS ===== */
        .review-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: var(--gap);
        }

        .review-card {
            background: var(--primary);
            border: var(--border-w) solid var(--secondary);
            padding: 32px;
            position: relative;
            transform: rotate(var(--rot, 0deg));
            transition: 0.1s;
        }
        .review-card:nth-child(1) { --rot: -1.2deg; }
        .review-card:nth-child(2) { --rot: 0.8deg; }
        .review-card:nth-child(3) { --rot: -0.5deg; }
        .review-card:nth-child(4) { --rot: 1.9deg; }
        .review-card:nth-child(5) { --rot: -1.8deg; }

        .review-card:hover {
            border-color: var(--accent);
            transform: rotate(0deg) scale(1.02);
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 12px;
        }
        .review-nick {
            font-weight: 900;
            font-size: 1.2rem;
            color: var(--accent);
        }
        .review-date {
            font-size: 0.8rem;
            opacity: 0.6;
        }
        .review-stars {
            color: var(--accent);
            font-size: 1.4rem;
            letter-spacing: 4px;
        }
        .review-body {
            font-size: 1.1rem;
            line-height: 1.4;
        }
        .review-body::before {
            content: '“';
            font-size: 2.4rem;
            color: var(--accent);
            margin-right: 4px;
        }

        /* ===== MAP / CONTACT ===== */
        .contact-block {
            display: flex;
            flex-wrap: wrap;
            gap: var(--gap);
            align-items: center;
            justify-content: space-between;
            background: var(--primary);
            border: var(--border-w) solid var(--secondary);
            padding: var(--padding);
        }

        .contact-phone-big {
            font-size: 2.6rem;
            font-weight: 900;
            color: var(--accent);
            border: var(--border-w) solid var(--accent);
            padding: 16px 40px;
            display: inline-block;
        }
        .contact-phone-big:hover {
            background: var(--accent);
            color: var(--primary);
        }

        /* ===== FOOTER ===== */
        footer {
            border-top: var(--border-w) solid var(--accent);
            padding: var(--padding) 0;
            text-align: center;
            font-size: 0.9rem;
        }
        footer small {
            opacity: 0.6;
            display: block;
            margin-top: 8px;
        }

        /* ===== RESPONSIVE (max-width: 768px) ===== */
        @media (max-width: 768px) {
            :root {
                --padding: 24px;
                --gap: 24px;
                --section-gap: 60px;
            }

            h1 {
                font-size: 3rem;
            }
            h2 {
                font-size: 2.2rem;
            }

            /* 햄버거 표시 + 네비 숨김 */
            .hamburger {
                display: flex;
            }

            nav ul {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: var(--primary);
                border-bottom: var(--border-w) solid var(--accent);
                padding: 24px var(--padding);
                gap: 16px;
                z-index: 999;
            }

            nav ul.show {
                display: flex;
            }

            nav a {
                display: block;
                width: 100%;
                text-align: center;
                border: var(--border-w) solid transparent;
            }

            .asymmetric-grid,
            .asymmetric-grid-rev {
                grid-template-columns: 1fr;
            }

            .contact-block {
                flex-direction: column;
                text-align: center;
            }

            .hero-phone {
                font-size: 1.8rem;
                padding: 10px 20px;
            }

            .stat-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .stat-num { font-size: 2.8rem; }

            .review-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .stat-grid {
                grid-template-columns: 1fr;
            }
            .hero-emoji {
                font-size: 3.6rem;
            }
        }

        /* ===== UTILITY ===== */
        .text-accent {
            color: var(--accent);
        }
        .skewed-box {
            display: inline-block;
            transform: skewX(-6deg);
            background: var(--accent);
            color: var(--primary);
            padding: 8px 24px;
            font-weight: 900;
            border: var(--border-w) solid var(--primary);
        }
        .mb-gap {
            margin-bottom: var(--gap);
        }
        .mb-section {
            margin-bottom: var(--section-gap);
        }
        .no-underline {
            border-bottom: none;
        }
        .no-underline:hover {
            background: transparent;
            color: var(--accent);
        }
    </style>
